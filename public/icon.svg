<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141413" />
      <stop offset="50%" stop-color="#1E1E1C" />
      <stop offset="100%" stop-color="#111110" />
    </linearGradient>

    <!-- Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B3B39" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#1E1E1C" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glowing Line Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="30%" stop-color="#6366F1" />
      <stop offset="70%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Backdrop Rounded Square -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Subtle inner border ring -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="none" stroke="url(#ringGrad)" stroke-width="4" />

  <!-- Glow effect for the pulse line -->
  <path d="M 64 256 L 160 256 L 208 128 L 248 384 L 288 200 L 320 288 L 352 256 L 448 256" 
        fill="none" 
        stroke="url(#lineGrad)" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        opacity="0.4"
        filter="url(#glow)" />

  <!-- Sleek neon pulse line -->
  <path d="M 64 256 L 160 256 L 208 128 L 248 384 L 288 200 L 320 288 L 352 256 L 448 256" 
        fill="none" 
        stroke="url(#lineGrad)" 
        stroke-width="14" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- The "Beating pulse" dot -->
  <circle cx="248" cy="384" r="10" fill="#F472B6" filter="url(#glow)" />
</svg>
